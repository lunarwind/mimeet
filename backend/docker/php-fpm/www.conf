[www]
user = www-data
group = www-data
listen = 9000

; Dynamic process manager — supports ~200 concurrent users
pm = dynamic
pm.max_children = 50
pm.start_servers = 10
pm.min_spare_servers = 5
pm.max_spare_servers = 20
pm.max_requests = 500

; Timeout
request_terminate_timeout = 60s

; Fix POST body pollution: force output buffering in FPM context
; php_admin_value overrides all php.ini / conf.d settings for FPM workers
php_admin_value[output_buffering] = 4096
