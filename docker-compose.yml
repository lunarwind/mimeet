services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    container_name: mimeet-backend
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - ./backend:/var/www/html
      - /var/www/html/vendor
    ports:
      - "9000:9000"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - APP_ENV=local
      - APP_DEBUG=true
      - DB_HOST=mysql
      - DB_DATABASE=${DB_DATABASE:-mimeet}
      - DB_USERNAME=${DB_USERNAME:-mimeet_user}
      - DB_PASSWORD=${DB_PASSWORD:-mimeet_secret_2024}
      - REDIS_HOST=redis
      - REDIS_PASSWORD=${REDIS_PASSWORD:-redis_secret_2024}
      - CACHE_DRIVER=redis
      - SESSION_DRIVER=redis
      - QUEUE_CONNECTION=redis
    networks:
      - mimeet

  nginx:
    image: nginx:1.25-alpine
    container_name: mimeet-nginx
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - ./backend:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - backend
    networks:
      - mimeet

  mysql:
    image: mysql:8.0
    container_name: mimeet-mysql
    restart: unless-stopped
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-root_secret_2024}
      MYSQL_DATABASE: ${DB_DATABASE:-mimeet}
      MYSQL_USER: ${DB_USERNAME:-mimeet_user}
      MYSQL_PASSWORD: ${DB_PASSWORD:-mimeet_secret_2024}
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_ROOT_PASSWORD:-root_secret_2024}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - mimeet

  redis:
    image: redis:7-alpine
    container_name: mimeet-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --requirepass ${REDIS_PASSWORD:-redis_secret_2024}
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redis_secret_2024}", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - mimeet

volumes:
  mysql_data:

networks:
  mimeet:
    driver: bridge
