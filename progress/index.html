<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MiMeet — Phase 1 開發進度</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;600&family=Noto+Sans+TC:wght@400;500&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --primary: #F0294E;
  --primary-dark: #A80F2C;
  --primary-pale: #FFF1F3;
  --dark: #111827;
  --mid: #374151;
  --muted: #6B7280;
  --border: #E5E7EB;
  --surface: #F9FAFB;
  --white: #FFFFFF;
  --green: #065F46;
  --green-bg: #D1FAE5;
  --green-mid: #10B981;
  --amber: #92400E;
  --amber-bg: #FEF3C7;
  --amber-mid: #F59E0B;
  --blue: #1E40AF;
  --blue-bg: #DBEAFE;
  --blue-mid: #3B82F6;
  --red-bg: #FEE2E2;
  --red: #991B1B;
  --gray-bg: #F3F4F6;
  --radius: 12px;
  --radius-sm: 8px;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Noto Sans TC', sans-serif;
  background: #FAFAFA;
  color: var(--dark);
  line-height: 1.6;
  min-height: 100vh;
}

/* ── Header ── */
.site-header {
  background: var(--white);
  border-bottom: 1px solid var(--border);
  padding: 0 max(24px, calc(50vw - 640px));
  position: sticky;
  top: 0;
  z-index: 100;
}
.header-inner {
  display: flex;
  align-items: center;
  justify-content: space-between;
  height: 60px;
  gap: 16px;
}
.logo {
  font-family: 'Noto Serif TC', serif;
  font-size: 20px;
  font-weight: 600;
  color: var(--primary);
  letter-spacing: -0.5px;
}
.logo span { color: var(--dark); font-weight: 400; font-size: 13px; margin-left: 8px; }
.header-meta {
  display: flex;
  align-items: center;
  gap: 12px;
  font-size: 12px;
  color: var(--muted);
}
.live-dot {
  width: 7px; height: 7px;
  border-radius: 50%;
  background: var(--green-mid);
  animation: pulse 2s infinite;
}
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }

/* ── Layout ── */
.page {
  max-width: 1280px;
  margin: 0 auto;
  padding: 32px 24px 80px;
}

/* ── Hero ── */
.hero {
  margin-bottom: 40px;
}
.hero-eyebrow {
  font-size: 12px;
  font-weight: 500;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  color: var(--primary);
  margin-bottom: 10px;
}
.hero-title {
  font-family: 'Noto Serif TC', serif;
  font-size: clamp(26px, 4vw, 40px);
  font-weight: 600;
  color: var(--dark);
  line-height: 1.25;
  margin-bottom: 12px;
}
.hero-sub {
  font-size: 15px;
  color: var(--muted);
  max-width: 560px;
}

/* ── KPI cards ── */
.kpi-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
  gap: 14px;
  margin-bottom: 40px;
}
.kpi {
  background: var(--white);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 20px;
  position: relative;
  overflow: hidden;
}
.kpi::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 3px;
  background: var(--accent, var(--primary));
}
.kpi-val {
  font-family: 'Inter', sans-serif;
  font-size: 32px;
  font-weight: 600;
  color: var(--dark);
  line-height: 1;
  margin-bottom: 6px;
}
.kpi-val .unit { font-size: 16px; font-weight: 400; color: var(--muted); margin-left: 2px; }
.kpi-label { font-size: 12px; color: var(--muted); }
.kpi-sub { font-size: 11px; color: var(--muted); margin-top: 4px; opacity: .7; }

/* ── Overall progress bar ── */
.overall-bar-wrap {
  background: var(--white);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 24px 28px;
  margin-bottom: 40px;
}
.bar-header { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 14px; }
.bar-title { font-size: 14px; font-weight: 500; color: var(--dark); }
.bar-pct { font-family: 'Inter', sans-serif; font-size: 22px; font-weight: 600; color: var(--primary); }
.bar-track {
  height: 8px;
  background: var(--gray-bg);
  border-radius: 99px;
  overflow: hidden;
  margin-bottom: 16px;
}
.bar-fill {
  height: 100%;
  border-radius: 99px;
  background: var(--primary);
  transition: width .6s ease;
}
.bar-segments {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
}
.seg {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 12px;
  color: var(--muted);
}
.seg-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }

/* ── Sprint section ── */
.section-title {
  font-family: 'Noto Serif TC', serif;
  font-size: 20px;
  font-weight: 600;
  color: var(--dark);
  margin-bottom: 20px;
  padding-bottom: 12px;
  border-bottom: 1px solid var(--border);
}

.sprints { display: flex; flex-direction: column; gap: 20px; margin-bottom: 48px; }

.sprint-card {
  background: var(--white);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
}
.sprint-head {
  display: grid;
  grid-template-columns: auto 1fr auto;
  align-items: center;
  gap: 16px;
  padding: 18px 24px;
  cursor: pointer;
  user-select: none;
}
.sprint-head:hover { background: var(--surface); }
.sprint-num {
  font-family: 'Inter', sans-serif;
  font-size: 11px;
  font-weight: 600;
  color: var(--primary);
  background: var(--primary-pale);
  padding: 4px 10px;
  border-radius: 20px;
  white-space: nowrap;
}
.sprint-info { min-width: 0; }
.sprint-name { font-size: 15px; font-weight: 500; color: var(--dark); }
.sprint-weeks { font-size: 12px; color: var(--muted); margin-top: 2px; }
.sprint-right { display: flex; align-items: center; gap: 16px; flex-shrink: 0; }
.sprint-mini-bar {
  width: 120px;
  height: 6px;
  background: var(--gray-bg);
  border-radius: 99px;
  overflow: hidden;
}
.sprint-mini-fill { height: 100%; border-radius: 99px; background: var(--primary); transition: width .4s; }
.sprint-pct-label {
  font-family: 'Inter', sans-serif;
  font-size: 13px;
  font-weight: 500;
  color: var(--muted);
  min-width: 36px;
  text-align: right;
}
.sprint-status-badge {
  font-size: 11px;
  font-weight: 500;
  padding: 4px 10px;
  border-radius: 20px;
  white-space: nowrap;
}
.badge-active { background: #DBEAFE; color: #1E40AF; }
.badge-done   { background: var(--green-bg); color: var(--green); }
.badge-todo   { background: var(--gray-bg); color: var(--muted); }

.sprint-chevron {
  width: 16px; height: 16px;
  border-right: 1.5px solid var(--muted);
  border-bottom: 1.5px solid var(--muted);
  transform: rotate(45deg) translate(-2px, -2px);
  transition: transform .2s;
  flex-shrink: 0;
}
.sprint-card.open .sprint-chevron {
  transform: rotate(-135deg) translate(-2px, -2px);
}

.sprint-body {
  display: none;
  border-top: 1px solid var(--border);
  padding: 20px 24px 24px;
}
.sprint-card.open .sprint-body { display: block; }

/* task table */
.task-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 13px;
}
.task-table th {
  font-size: 11px;
  font-weight: 500;
  color: var(--muted);
  text-align: left;
  padding: 0 12px 10px 0;
  border-bottom: 1px solid var(--border);
  white-space: nowrap;
}
.task-table td {
  padding: 9px 12px 9px 0;
  border-bottom: 1px solid var(--border);
  vertical-align: middle;
}
.task-table tr:last-child td { border-bottom: none; }
.task-table tr:hover td { background: var(--surface); }

.task-id { font-family: 'Inter', sans-serif; font-size: 11px; color: var(--muted); white-space: nowrap; }
.task-name { color: var(--dark); line-height: 1.4; }
.task-name.done { text-decoration: line-through; color: var(--muted); }

.cat-badge, .status-badge {
  display: inline-block;
  font-size: 10px;
  font-weight: 500;
  padding: 2px 7px;
  border-radius: 20px;
  white-space: nowrap;
}
.cat-FE   { background: var(--blue-bg);  color: var(--blue); }
.cat-BE   { background: var(--primary-pale); color: var(--primary-dark); }
.cat-INFRA{ background: var(--gray-bg);  color: #444; }

.s-todo   { background: var(--gray-bg);     color: #555; }
.s-doing  { background: var(--blue-bg);     color: var(--blue); }
.s-review { background: var(--amber-bg);    color: var(--amber); }
.s-done   { background: var(--green-bg);    color: var(--green); }

/* ── Milestone ── */
.milestones { margin-bottom: 48px; }
.milestone-list { display: flex; flex-direction: column; gap: 0; position: relative; }
.milestone-list::before {
  content: '';
  position: absolute;
  left: 19px; top: 20px; bottom: 20px;
  width: 1px;
  background: var(--border);
}
.milestone {
  display: grid;
  grid-template-columns: 40px 1fr;
  gap: 16px;
  align-items: start;
  padding: 16px 0;
}
.ms-dot {
  width: 40px; height: 40px;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 14px;
  font-weight: 600;
  font-family: 'Inter', sans-serif;
  flex-shrink: 0;
  position: relative;
  z-index: 1;
  border: 2px solid transparent;
}
.ms-dot.done  { background: var(--green-bg);  color: var(--green);  border-color: var(--green-mid); }
.ms-dot.active{ background: var(--primary-pale); color: var(--primary); border-color: var(--primary); }
.ms-dot.todo  { background: var(--white);      color: var(--muted);  border-color: var(--border); }

.ms-content { padding-top: 8px; }
.ms-title { font-size: 14px; font-weight: 500; color: var(--dark); margin-bottom: 3px; }
.ms-date  { font-size: 12px; color: var(--muted); margin-bottom: 6px; }
.ms-criteria { font-size: 12px; color: var(--muted); line-height: 1.6; }

/* ── Footer ── */
.page-footer {
  border-top: 1px solid var(--border);
  padding: 24px 0 0;
  margin-top: 24px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  flex-wrap: wrap;
  gap: 8px;
  font-size: 12px;
  color: var(--muted);
}
.footer-logo { font-family: 'Noto Serif TC', serif; color: var(--primary); font-weight: 600; }

/* ── Edit mode ── */
.edit-bar {
  background: var(--dark);
  color: #E5E7EB;
  padding: 10px max(24px, calc(50vw - 640px));
  font-size: 12px;
  display: flex;
  align-items: center;
  gap: 12px;
  flex-wrap: wrap;
}
.edit-bar strong { color: white; }
.edit-btn {
  padding: 5px 14px;
  border-radius: 6px;
  border: 1px solid #4B5563;
  background: transparent;
  color: #D1D5DB;
  font-size: 12px;
  cursor: pointer;
  font-family: 'Noto Sans TC', sans-serif;
}
.edit-btn:hover { background: #374151; }
.edit-btn.primary { background: var(--primary); border-color: var(--primary); color: white; }
.edit-spacer { flex: 1; }

/* ── Responsive ── */
@media (max-width: 640px) {
  .sprint-mini-bar { display: none; }
  .sprint-right { gap: 10px; }
  .task-table th:nth-child(1),
  .task-table td:nth-child(1) { display: none; }
  .kpi-grid { grid-template-columns: repeat(2, 1fr); }
}

/* ── Animations ── */
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(12px); }
  to   { opacity: 1; transform: translateY(0); }
}
.kpi       { animation: fadeUp .4s ease both; }
.kpi:nth-child(1){ animation-delay: .05s }
.kpi:nth-child(2){ animation-delay: .10s }
.kpi:nth-child(3){ animation-delay: .15s }
.kpi:nth-child(4){ animation-delay: .20s }
.kpi:nth-child(5){ animation-delay: .25s }
</style>
</head>
<body>

<!-- Edit bar (hidden for viewers, shown only in edit mode) -->
<div class="edit-bar" id="editBar" style="display:none">
  <strong>編輯模式</strong>
  <span>點擊任務狀態可切換 — 變更自動存入 localStorage</span>
  <span class="edit-spacer"></span>
  <button class="edit-btn" onclick="exportData()">匯出進度 JSON</button>
  <button class="edit-btn" onclick="importData()">匯入進度 JSON</button>
  <button class="edit-btn primary" onclick="toggleEdit()">完成編輯</button>
</div>

<header class="site-header">
  <div class="header-inner">
    <div class="logo">MiMeet <span>Phase 1 開發進度報告</span></div>
    <div class="header-meta">
      <div class="live-dot"></div>
      <span id="lastUpdate">載入中...</span>
      <span style="color:var(--border)">|</span>
      <span id="viewMode" style="cursor:pointer;color:var(--muted)" onclick="handleEditToggle()" title="點擊進入編輯模式">👁 閱讀模式</span>
    </div>
  </div>
</header>

<main class="page">

  <div class="hero">
    <div class="hero-eyebrow">MiMeet · Phase 1 MVP · Week 1–12</div>
    <h1 class="hero-title">開發進度追蹤</h1>
    <p class="hero-sub">前端先行策略 — 由單一開發者執行，共 6 個 Sprint，86 個任務，預計 12 週完成 MVP。</p>
  </div>

  <!-- KPIs -->
  <div class="kpi-grid" id="kpiGrid"></div>

  <!-- Overall progress -->
  <div class="overall-bar-wrap">
    <div class="bar-header">
      <span class="bar-title">整體完成進度</span>
      <span class="bar-pct" id="overallPct">0%</span>
    </div>
    <div class="bar-track"><div class="bar-fill" id="overallFill" style="width:0%"></div></div>
    <div class="bar-segments" id="barSegments"></div>
  </div>

  <!-- Sprints -->
  <h2 class="section-title">Sprint 詳細進度</h2>
  <div class="sprints" id="sprintsContainer"></div>

  <!-- Milestones -->
  <h2 class="section-title">里程碑驗收</h2>
  <div class="milestones">
    <div class="milestone-list" id="milestoneList"></div>
  </div>

  <footer class="page-footer">
    <span><span class="footer-logo">MiMeet</span> — 機密文件，僅供內部使用</span>
    <span id="footerDate"></span>
  </footer>

</main>

// ── State ────────────────────────────────────────
let taskState = {}

function storageKey(id) { return 'mm_task_' + id }

function loadState() {
  const allTasks = Object.values(ALL_TASKS).flat()
  allTasks.forEach(t => {
    try {
      const saved = localStorage.getItem(storageKey(t.id))
      taskState[t.id] = saved || t.status
    } catch(e) {
      taskState[t.id] = t.status
    }
  })
}

function saveState(id, status) {
  taskState[id] = status
  try {
    localStorage.setItem(storageKey(id), status)
    localStorage.setItem('mm_lastUpdate', new Date().toISOString())
  } catch(e) {}
}

function nextStatus(s) {
  const i = STATUSES.indexOf(s)
  return STATUSES[(i + 1) % STATUSES.length]
}

// ── Computed ─────────────────────────────────────
function getStats() {
  const allTasks = Object.values(ALL_TASKS).flat()
  const total = allTasks.length
  const done = allTasks.filter(t => taskState[t.id] === 'done').length
  const doing = allTasks.filter(t => taskState[t.id] === 'doing').length
  const review = allTasks.filter(t => taskState[t.id] === 'review').length
  const todo = total - done - doing - review
  return { total, done, doing, review, todo, pct: total ? Math.round(done / total * 100) : 0 }
}

function getSprintStats(sid) {
  const tasks = ALL_TASKS[sid] || []
  const total = tasks.length
  const done = tasks.filter(t => taskState[t.id] === 'done').length
  const doing = tasks.filter(t => taskState[t.id] === 'doing').length
  const pct = total ? Math.round(done / total * 100) : 0
  return { total, done, doing, pct }
}

function getSprintStatus(sid) {
  const { done, doing, total } = getSprintStats(sid)
  if (done === total) return 'done'
  if (done > 0 || doing > 0) return 'active'
  return 'todo'
}

function getMilestoneStatus(ms) {
  const sid = ms.sprint
  const tasks = ALL_TASKS[sid] || []
  const total = tasks.length
  const done = tasks.filter(t => taskState[t.id] === 'done').length
  if (done === total && total > 0) return 'done'
  const doing = tasks.filter(t => taskState[t.id] === 'doing' || taskState[t.id] === 'review').length
  if (done > 0 || doing > 0) return 'active'
  return 'todo'
}

// ── Render ───────────────────────────────────────
function renderKPIs() {
  const s = getStats()
  const sprintsDone = SPRINTS.filter(sp => getSprintStatus(sp.id) === 'done').length
  const activeSprint = SPRINTS.find(sp => getSprintStatus(sp.id) === 'active')

  document.getElementById('kpiGrid').innerHTML = `
    <div class="kpi" style="--accent:var(--primary)">
      <div class="kpi-val">${s.pct}<span class="unit">%</span></div>
      <div class="kpi-label">整體完成率</div>
      <div class="kpi-sub">${s.done} / ${s.total} 個任務</div>
    </div>
    <div class="kpi" style="--accent:var(--blue-mid)">
      <div class="kpi-val">${s.doing + s.review}</div>
      <div class="kpi-label">進行中任務</div>
      <div class="kpi-sub">含 ${s.review} 個審查中</div>
    </div>
    <div class="kpi" style="--accent:var(--green-mid)">
      <div class="kpi-val">${s.done}</div>
      <div class="kpi-label">已完成任務</div>
      <div class="kpi-sub">共 ${s.total} 個任務</div>
    </div>
    <div class="kpi" style="--accent:var(--amber-mid)">
      <div class="kpi-val">${sprintsDone}<span class="unit">/ 6</span></div>
      <div class="kpi-label">Sprint 完成數</div>
      <div class="kpi-sub">${activeSprint ? '進行中：' + activeSprint.label : '全部完成'}</div>
    </div>
    <div class="kpi" style="--accent:#8B5CF6">
      <div class="kpi-val">12<span class="unit">週</span></div>
      <div class="kpi-label">預計總工期</div>
      <div class="kpi-sub">Phase 1 MVP</div>
    </div>
  `
}

function renderOverallBar() {
  const s = getStats()
  document.getElementById('overallPct').textContent = s.pct + '%'
  document.getElementById('overallFill').style.width = s.pct + '%'

  const segs = [
    { label: '完成', count: s.done,   color: 'var(--green-mid)' },
    { label: '進行中', count: s.doing, color: 'var(--blue-mid)' },
    { label: '審查中', count: s.review, color: 'var(--amber-mid)' },
    { label: '待開始', count: s.todo,  color: 'var(--border)' },
  ]
  document.getElementById('barSegments').innerHTML = segs.map(seg => `
    <div class="seg">
      <div class="seg-dot" style="background:${seg.color}"></div>
      <span>${seg.label} ${seg.count}</span>
    </div>
  `).join('')
}

function renderSprints() {
  const container = document.getElementById('sprintsContainer')
  container.innerHTML = SPRINTS.map(sp => {
    const st = getSprintStats(sp.id)
    const status = getSprintStatus(sp.id)
    const badgeCls = status === 'done' ? 'badge-done' : status === 'active' ? 'badge-active' : 'badge-todo'
    const badgeLabel = status === 'done' ? '完成' : status === 'active' ? '進行中' : '待開始'
    const tasks = ALL_TASKS[sp.id] || []

    const taskRows = tasks.map(t => {
      const s = taskState[t.id] || t.status
      const isDone = s === 'done'
      return `
        <tr>
          <td><span class="task-id">${t.id}</span></td>
          <td><span class="task-name ${isDone ? 'done' : ''}">${t.title}</span></td>
          <td><span class="cat-badge cat-${t.cat}">${t.cat}</span></td>
          <td>
            <span class="status-badge ${STATUS_CLS[s]}"
              ${editMode ? `style="cursor:pointer" onclick="cycleStatus('${t.id}', this)"` : ''}
              data-id="${t.id}">
              ${STATUS_LABELS[s]}
            </span>
          </td>
        </tr>
      `
    }).join('')

    return `
      <div class="sprint-card" id="sprint-${sp.id}">
        <div class="sprint-head" onclick="toggleSprint('${sp.id}')">
          <span class="sprint-num">${sp.label}</span>
          <div class="sprint-info">
            <div class="sprint-name">${sp.sub}</div>
            <div class="sprint-weeks">${sp.weeks} &nbsp;·&nbsp; ${st.done} / ${st.total} 完成</div>
          </div>
          <div class="sprint-right">
            <div class="sprint-mini-bar">
              <div class="sprint-mini-fill" style="width:${st.pct}%"></div>
            </div>
            <span class="sprint-pct-label">${st.pct}%</span>
            <span class="sprint-status-badge ${badgeCls}">${badgeLabel}</span>
            <div class="sprint-chevron"></div>
          </div>
        </div>
        <div class="sprint-body">
          <table class="task-table">
            <thead>
              <tr>
                <th style="width:70px">ID</th>
                <th>任務名稱</th>
                <th style="width:70px">分類</th>
                <th style="width:80px">狀態</th>
              </tr>
            </thead>
            <tbody>${taskRows}</tbody>
          </table>
        </div>
      </div>
    `
  }).join('')

  // auto-open active sprint
  const active = SPRINTS.find(sp => getSprintStatus(sp.id) === 'active')
  if (active) {
    const card = document.getElementById('sprint-' + active.id)
    if (card) card.classList.add('open')
  }
}

function renderMilestones() {
  document.getElementById('milestoneList').innerHTML = MILESTONES.map(ms => {
    const status = getMilestoneStatus(ms)
    return `
      <div class="milestone">
        <div class="ms-dot ${status}">${ms.label}</div>
        <div class="ms-content">
          <div class="ms-title">${ms.title}</div>
          <div class="ms-date">${ms.date}</div>
          <div class="ms-criteria">${ms.criteria}</div>
        </div>
      </div>
    `
  }).join('')
}

function renderAll() {
  renderKPIs()
  renderOverallBar()
  renderSprints()
  renderMilestones()
  updateLastUpdate()
}

function updateLastUpdate() {
  try {
    const ts = localStorage.getItem('mm_lastUpdate')
    if (ts) {
      const d = new Date(ts)
      document.getElementById('lastUpdate').textContent = '最後更新 ' + d.toLocaleDateString('zh-TW') + ' ' + d.toLocaleTimeString('zh-TW', {hour:'2-digit', minute:'2-digit'})
    } else {
      document.getElementById('lastUpdate').textContent = '尚無更新記錄'
    }
  } catch(e) {
    document.getElementById('lastUpdate').textContent = new Date().toLocaleDateString('zh-TW')
  }
  document.getElementById('footerDate').textContent = '產生於 ' + new Date().toLocaleDateString('zh-TW')
}

// ── Interactions ─────────────────────────────────
function toggleSprint(id) {
  const card = document.getElementById('sprint-' + id)
  card.classList.toggle('open')
}

function cycleStatus(id, el) {
  if (!editMode) return
  const current = taskState[id]
  const next = nextStatus(current)
  saveState(id, next)
  el.className = 'status-badge ' + STATUS_CLS[next]
  el.textContent = STATUS_LABELS[next]
  if (next === 'done') el.closest('tr').querySelector('.task-name').classList.add('done')
  else el.closest('tr').querySelector('.task-name').classList.remove('done')
  // re-render KPI + bar + sprint header only (light update)
  renderKPIs()
  renderOverallBar()
  renderMilestones()
  // update sprint header
  updateSprintHeader(id.split('-')[0])
}

function updateSprintHeader(sid) {
  const card = document.getElementById('sprint-' + sid)
  if (!card) return
  const st = getSprintStats(sid)
  const status = getSprintStatus(sid)
  const badgeCls = status === 'done' ? 'badge-done' : status === 'active' ? 'badge-active' : 'badge-todo'
  const badgeLabel = status === 'done' ? '完成' : status === 'active' ? '進行中' : '待開始'
  card.querySelector('.sprint-weeks').textContent = SPRINTS.find(s=>s.id===sid).weeks + ' · ' + st.done + ' / ' + st.total + ' 完成'
  card.querySelector('.sprint-mini-fill').style.width = st.pct + '%'
  card.querySelector('.sprint-pct-label').textContent = st.pct + '%'
  const badge = card.querySelector('.sprint-status-badge')
  badge.className = 'sprint-status-badge ' + badgeCls
  badge.textContent = badgeLabel
}

// ── Edit mode ────────────────────────────────────
let editPasscode = 'mimeet2026'

function handleEditToggle() {
  if (!editMode) {
    const p = prompt('請輸入編輯密碼：')
    if (p === editPasscode) toggleEdit()
    else if (p !== null) alert('密碼錯誤')
  } else {
    toggleEdit()
  }
}

function toggleEdit() {
  editMode = !editMode
  document.getElementById('editBar').style.display = editMode ? 'flex' : 'none'
  document.getElementById('viewMode').textContent = editMode ? '✏️ 編輯模式' : '👁 閱讀模式'
  renderSprints()
}

function exportData() {
  const data = {}
  Object.values(ALL_TASKS).flat().forEach(t => { data[t.id] = taskState[t.id] })
  const blob = new Blob([JSON.stringify(data, null, 2)], {type:'application/json'})
  const a = document.createElement('a')
  a.href = URL.createObjectURL(blob)
  a.download = 'mimeet-progress-' + new Date().toISOString().slice(0,10) + '.json'
  a.click()
}

function importData() {
  const input = document.createElement('input')
  input.type = 'file'
  input.accept = '.json'
  input.onchange = e => {
    const file = e.target.files[0]
    const reader = new FileReader()
    reader.onload = ev => {
      try {
        const data = JSON.parse(ev.target.result)
        Object.entries(data).forEach(([id, status]) => {
          if (STATUSES.includes(status)) saveState(id, status)
        })
        renderAll()
        alert('進度匯入成功！')
      } catch(err) { alert('JSON 格式錯誤') }
    }
    reader.readAsText(file)
  }
  input.click()
}
