services:
  app:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    container_name: mimeet-app
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - ./backend:/var/www/html
      - /var/www/html/vendor
      - ./backend/docker/output-buffering.ini:/usr/local/etc/php/conf.d/zzz-output-buffering.ini:ro
    ports:
      - "9000:9000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - APP_ENV=staging
      - APP_DEBUG=false
      - DB_HOST=db
      - DB_DATABASE=mimeet
      - DB_USERNAME=mimeet_user
      - DB_PASSWORD=${DB_PASSWORD:-mimeet_staging_2026}
      - REDIS_HOST=redis
      - CACHE_DRIVER=redis
      - SESSION_DRIVER=redis
      - QUEUE_CONNECTION=redis
    networks:
      - mimeet

  db:
    image: mysql:8.0
    container_name: mimeet-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-root_staging_2026}
      MYSQL_DATABASE: mimeet
      MYSQL_USER: mimeet_user
      MYSQL_PASSWORD: ${DB_PASSWORD:-mimeet_staging_2026}
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_ROOT_PASSWORD:-root_staging_2026}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - mimeet

  redis:
    image: redis:7-alpine
    container_name: mimeet-redis
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - mimeet

  reverb:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    container_name: mimeet-reverb
    restart: unless-stopped
    working_dir: /var/www/html
    command: php artisan reverb:start --host=0.0.0.0 --port=8080
    volumes:
      - ./backend:/var/www/html
      - /var/www/html/vendor
    ports:
      - "8080:8080"
    depends_on:
      app:
        condition: service_started
      redis:
        condition: service_healthy
    environment:
      - APP_ENV=staging
      - APP_DEBUG=false
      - DB_HOST=db
      - DB_DATABASE=mimeet
      - DB_USERNAME=mimeet_user
      - DB_PASSWORD=${DB_PASSWORD:-mimeet_staging_2026}
      - REDIS_HOST=redis
      - CACHE_DRIVER=redis
      - QUEUE_CONNECTION=redis
    networks:
      - mimeet

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    container_name: mimeet-worker
    restart: unless-stopped
    working_dir: /var/www/html
    command: php artisan queue:work redis --sleep=3 --tries=3 --max-time=3600
    volumes:
      - ./backend:/var/www/html
      - /var/www/html/vendor
    depends_on:
      app:
        condition: service_started
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - APP_ENV=staging
      - APP_DEBUG=false
      - DB_HOST=db
      - DB_DATABASE=mimeet
      - DB_USERNAME=mimeet_user
      - DB_PASSWORD=${DB_PASSWORD:-mimeet_staging_2026}
      - REDIS_HOST=redis
      - CACHE_DRIVER=redis
      - QUEUE_CONNECTION=redis
    networks:
      - mimeet

  mailpit:
    image: axllent/mailpit:latest
    container_name: mimeet-mailpit
    restart: unless-stopped
    ports:
      - "127.0.0.1:8025:8025"  # Web UI（僅本機；外部用 SSH tunnel 或加認證後再改 0.0.0.0）
      - "1025:1025"             # SMTP（container 內部走 Docker network 時不需 host port，保留做本機測試）
    environment:
      - MP_SMTP_AUTH_ALLOW_INSECURE=1
      - MP_MAX_MESSAGES=500
    networks:
      - mimeet

  scheduler:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    container_name: mimeet-scheduler
    restart: unless-stopped
    working_dir: /var/www/html
    command: sh -c "while true; do php artisan schedule:run --verbose --no-interaction; sleep 60; done"
    volumes:
      - ./backend:/var/www/html
      - /var/www/html/vendor
    depends_on:
      app:
        condition: service_started
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - APP_ENV=staging
      - APP_DEBUG=false
      - DB_HOST=db
      - DB_DATABASE=mimeet
      - DB_USERNAME=mimeet_user
      - DB_PASSWORD=${DB_PASSWORD:-mimeet_staging_2026}
      - REDIS_HOST=redis
      - CACHE_DRIVER=redis
      - QUEUE_CONNECTION=redis
    networks:
      - mimeet

volumes:
  db_data:

networks:
  mimeet:
    driver: bridge
