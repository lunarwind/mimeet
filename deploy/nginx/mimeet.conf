# ── API (api.mimeet.online) ──
server {
    server_name api.mimeet.online;
    root /var/www/mimeet/backend/public;
    index index.php;
    client_max_body_size 10M;

    server_tokens off;

    location / { try_files $uri $uri/ /index.php?$query_string; }
    location ~ \.php$ {
        fastcgi_pass 127.0.0.1:9000;
        fastcgi_param SCRIPT_FILENAME /var/www/html/public$fastcgi_script_name;
        include fastcgi_params;
        fastcgi_hide_header X-Powered-By;
    }
    # ── WebSocket (Laravel Reverb) ──
    location /app {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    location /apps {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /storage { alias /var/www/mimeet/backend/storage/app/public; }
    location ~ /\.(env|git) { deny all; return 404; }

    listen 443 ssl;
    ssl_certificate /etc/letsencrypt/live/mimeet.online/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/mimeet.online/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; connect-src 'self' https://api.mimeet.online wss://api.mimeet.online; font-src 'self' data:; frame-ancestors 'none';" always;
}

# ── Frontend (mimeet.online) ──
server {
    server_name mimeet.online;
    root /var/www/mimeet/frontend/dist;
    index index.html;

    server_tokens off;

    location / { try_files $uri $uri/ /index.html; }
    location ~* \.(js|css|png|jpg|ico|svg|woff2?)$ { expires 7d; }

    listen 443 ssl;
    ssl_certificate /etc/letsencrypt/live/mimeet.online/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/mimeet.online/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(self)" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; connect-src 'self' https://api.mimeet.online wss://api.mimeet.online; font-src 'self' data:; frame-ancestors 'none';" always;
}

# ── Admin (admin.mimeet.online) ──
server {
    server_name admin.mimeet.online;
    root /var/www/mimeet/admin/dist;
    index index.html;

    server_tokens off;

    location / { try_files $uri $uri/ /index.html; }
    location ~* \.(js|css|png|jpg|ico|svg|woff2?)$ { expires 7d; }

    listen 443 ssl;
    ssl_certificate /etc/letsencrypt/live/mimeet.online/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/mimeet.online/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(self)" always;
    add_header X-Robots-Tag "noindex, nofollow" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; connect-src 'self' https://api.mimeet.online wss://api.mimeet.online; font-src 'self' data:; frame-ancestors 'none';" always;
}

# ── HTTP redirects ──
server {
    listen 80;
    server_name mimeet.online;
    return 301 https://$host$request_uri;
}
server {
    listen 80;
    server_name api.mimeet.online;
    return 301 https://$host$request_uri;
}
server {
    listen 80;
    server_name admin.mimeet.online;
    return 301 https://$host$request_uri;
}
